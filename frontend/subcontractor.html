<!DOCTYPE html>
<html>
<head>
<title>Subcontractor System</title>
<link rel="stylesheet" href="./css/style.css">

<style>

/* ================= BASE ================= */
body{
    font-family:'Segoe UI';
    margin:0;
}

/* ================= CONTAINER ================= */
.container{
    padding:20px;
}

/* ================= CARD ================= */
.card{
    padding:20px;
    border-radius:14px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    margin-bottom:20px;
}

/* ================= TITLE ================= */
.section-title{
    margin-bottom:15px;
}

/* ================= GRID ================= */
.form-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:12px;
}

/* ================= INPUT ================= */
input,select{
    width:100%;
    padding:10px;
    border-radius:10px;
}

/* ================= CHECKBOX ================= */
.checkbox-row{
    display:flex;
    align-items:center;
    gap:8px;
}

/* ================= BUTTON ================= */
.form-actions{
    grid-column:1/-1;
}

button{
    padding:10px 14px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#7c1d6f,#ec4899);
    color:white;
    cursor:pointer;
}

/* ================= TABLE ================= */
.table-container{
    max-height:500px;
    overflow:auto;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:10px;
    text-align:center;
}

/* FILTER ROW */
thead tr:first-child th{
    background:#0f172a;
    position:sticky;
    top:0;
    z-index:10;
}

/* HEADER */
thead tr:nth-child(2) th{
    background:#1f4e79;
    color:white;
    position:sticky;
    top:40px;
    z-index:9;
}

/* HOVER */
tbody tr:hover{
    background:#e2e8f0;
}

</style>
</head>
<body>

<div class="container">

<!-- ================= FORM CARD ================= -->
<div class="card">

<h2 class="section-title">📋 Subcontractor (SC) Record</h2>

<div class="form-grid">

<!-- PROJECT -->
<div class="input-group col-3">
    <select id="project">
        <option value="">Select Project</option>
        <option>Sadayem</option>
        <option>Makkah</option>
        <option>Madinah</option>
    </select>
    <label>Project</label>
</div>

<!-- WORK TYPE -->
<div class="input-group col-3">
    <select id="work_type">
        <option value="">Select Work Type</option>
        <option>Concrete & Masonry</option>
        <option>Masonry</option>
        <option>Plaster</option>
        <option>Paint</option>
        <option>Tiles</option>
        <option>Insulation</option>
        <option>Electrical</option>
        <option>Mechanical</option>
    </select>
    <label>Work Type</label>
</div>

<!-- RETENTION -->
<div class="input-group col-3">
    <select id="retention_percent">
        <option value="10">Retention 10%</option>
        <option value="5">Retention 5%</option>
        <option value="0">Retention 0%</option>
    </select>
    <label>Retention</label>
</div>

<!-- VAT -->
<div class="input-group col-3">
    <select id="vat_percent">
        <option value="15">VAT 15%</option>
        <option value="0">VAT 0%</option>
    </select>
    <label>VAT</label>
</div>

<!-- CHECKBOX -->
<div class="checkbox-row col-6">
    <input type="checkbox" id="has_advance">
    <label for="has_advance">Has Advance Payment</label>
</div>

<!-- ADVANCE -->
<div class="input-group col-3">
    <input id="advance_amount" placeholder=" ">
    <label>Advance Amount</label>
</div>

<!-- CONTRACT -->
<div class="input-group col-3">
    <input id="contract_no" placeholder=" ">
    <label>Contract No</label>
</div>

<!-- COMPANY -->
<div class="input-group col-3">
    <input id="company" placeholder=" ">
    <label>Company Name</label>
</div>

<!-- CR -->
<div class="input-group col-3">
    <input id="cr" placeholder=" ">
    <label>CR</label>
</div>

<!-- VAT NUMBER -->
<div class="input-group col-3">
    <input id="vat_number" placeholder=" ">
    <label>VAT Number</label>
</div>

<!-- SUB NAME -->
<div class="input-group col-3">
    <input id="subcontractor_name" placeholder=" ">
    <label>Subcontractor Name</label>
</div>

<!-- PHONE -->
<div class="input-group col-3">
    <input id="phone" placeholder=" ">
    <label>Phone</label>
</div>

<!-- EMAIL -->
<div class="input-group col-3">
    <input type="email" id="email" placeholder=" ">
    <label>Email</label>
</div>

<small id="email_error" style="color:red; display:none;">Invalid email</small>

<!-- BUTTON -->
<div class="form-actions col-12">
    <button id="mainBtn" onclick="save()">➕ Add Subcontractor</button>
</div>

</div>

<p id="msg"></p>

</div>

<!-- ================= FILTER + TABLE CARD ================= -->
<div class="card">

<h3 class="section-title">🔎 Filters</h3>

<div class="table-container">

<table>

<thead>

<!-- FILTER ROW -->
<tr>
<th>
<select id="f_project" onchange="filterTable()">
<option value="">All</option>
<option value="1">Sadayem</option>
<option value="2">Makkah</option>
<option value="3">Madinah</option>
</select>
</th>

<th>
<select id="f_work" onchange="filterTable()">
<option value="">All</option>
<option>Concrete & Masonry</option>
<option>Masonry</option>
<option>Plaster</option>
<option>Paint</option>
<option>Tiles</option>
<option>Insulation</option>
<option>Electrical</option>
<option>Mechanical</option>
</select>
</th>

<th><select id="f_name" onchange="filterTable()"><option value="">All</option></select></th>
<th><select id="f_contract" onchange="filterTable()"><option value="">All</option></select></th>
<th><select id="f_company" onchange="filterTable()"><option value="">All</option></select></th>
<th><select id="f_phone" onchange="filterTable()"><option value="">All</option></select></th>
<th><select id="f_email" onchange="filterTable()"><option value="">All</option></select></th>
<th><select id="f_vat" onchange="filterTable()"><option value="">All</option></select></th>
<th><select id="f_cr" onchange="filterTable()"><option value="">All</option></select></th>
<th><select id="f_iban" onchange="filterTable()"><option value="">All</option></select></th>
<th></th>
</tr>

<!-- HEADER -->
<tr>
<th>Project</th>
<th>Work Type</th>
<th>Name</th>
<th>Contract</th>
<th>Company</th>
<th>Phone</th>
<th>Email</th>
<th>VAT</th>
<th>CR</th>
<th>Adv. Amount</th>
<th>Actions</th>
</tr>

</thead>

<tbody id="table"></tbody>

</table>

</div>

</div>

</div>

</body>
</html>
