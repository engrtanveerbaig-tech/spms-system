<!DOCTYPE html>
<html>
<head>
<title>Subcontractor System</title>
<link rel="stylesheet" href="./css/style.css">

<style>

/* ================= BASE ================= */
body{
    font-family:'Segoe UI';
    margin:0;
}

/* ================= CONTAINER ================= */
.container{
    padding:20px;
}

/* ================= CARD ================= */
.card{
    padding:20px;
    border-radius:14px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    margin-bottom:20px;
}

/* ================= TITLE ================= */
.section-title{
    margin-bottom:15px;
}

/* ================= GRID ================= */
.form-grid{
    align-items: start;
    display:grid;
    gap:12px;
}

/* ================= INPUT ================= */
input,select{
    width:100%;
    padding:10px;
    border-radius:10px;
}

/* ===== CHECKBOX PERFECT ALIGNMENT ===== */
.checkbox-fix{
    display:flex;
    align-items:flex-end;
    height:100%;
}

.checkbox-label{
    display:flex;
    align-items:center;
    gap:10px;
    height:42px;
    cursor:pointer;
    color:var(--text);
    font-size:14px;
}

/* FIX SMALL CHECKBOX SIZE */
.checkbox-label input[type="checkbox"]{
    width:18px;
    height:18px;
    cursor:pointer;
}

/* ================= BUTTON ================= */
.form-actions{
    grid-column:1/-1;
}

button{
    padding:10px 14px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#7c1d6f,#ec4899);
    color:white;
    cursor:pointer;
}

/* ================= TABLE ================= */
.table-container{
    max-height:500px;
    overflow:auto;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:10px;
    text-align:center;
}

/* FILTER ROW */
thead tr:first-child th{
    background:#0f172a;
    position:sticky;
    top:0;
    z-index:10;
}

/* HEADER */
thead tr:nth-child(2) th{
    background:#1f4e79;
    color:white;
    position:sticky;
    top:40px;
    z-index:9;
}

/* HOVER */
tbody tr:hover{
    background:#aeb2b7;
}

</style>
</head>
<body>

<div class="content">

<div class="container">

<!-- ================= FORM ================= -->
<div class="card premium-card">

<h2 class="section-title">📋 Subcontractor (SC) Record</h2>

<div class="premium-grid">

<!-- LEFT -->
<div class="form-section">

<h4 class="form-section-title">Project Details</h4>

<div class="input-group">
<select id="project" required>
<option value="" disabled selected></option>
<option>Sadayem</option>
<option>Makkah</option>
<option>Madinah</option>
</select>
<label>Project</label>
</div>

<div class="input-group">
<select id="work_type" required>
<option value="" disabled selected></option>
<option>Concrete & Masonry</option>
<option>Masonry</option>
<option>Plaster</option>
<option>Paint</option>
<option>Tiles</option>
<option>Insulation</option>
<option>Electrical</option>
<option>Mechanical</option>
</select>
<label>Work Type</label>
</div>

<div class="input-group">
<select id="retention_percent" required>
<option value="10">10%</option>
<option value="5">5%</option>
<option value="0">0%</option>
</select>
<label>Retention</label>
</div>

<div class="input-group">
<select id="vat_percent" required>
<option value="15">15%</option>
<option value="0">0%</option>
</select>
<label>VAT</label>
</div>

</div>

<!-- RIGHT -->
<div class="form-section">

<h4 class="form-section-title">Contract Details</h4>

<div class="checkbox-box">
<label>
<input type="checkbox" id="has_advance">
<span>Has Advance Payment</span>
</label>
</div>

<div class="input-group">
<input id="advance_amount" placeholder=" ">
<label>Advance Amount</label>
</div>

<div class="input-group">
<input id="contract_no" placeholder=" ">
<label>Contract No</label>
</div>

<div class="input-group">
<input id="company" placeholder=" ">
<label>Company Name</label>
</div>

<div class="input-group">
<input id="cr" placeholder=" ">
<label>CR</label>
</div>

<div class="input-group">
<input id="vat_number" placeholder=" ">
<label>VAT Number</label>
</div>

</div>

<!-- FULL WIDTH -->
<div class="form-section full">

<h4 class="form-section-title">Contact Details</h4>

<div class="form-row">

<div class="input-group">
<input id="subcontractor_name" placeholder=" ">
<label>Subcontractor Name</label>
</div>

<div class="input-group">
<input id="phone" placeholder=" ">
<label>Phone</label>
</div>

<div class="input-group">
<input type="email" id="email" placeholder=" ">
<label>Email</label>
</div>

</div>

</div>

<!-- BUTTON -->
<div class="form-actions">
<button id="mainBtn" onclick="save()">➕ Add Subcontractor</button>
</div>

</div>

</div>

</div>
</div>

<p id="msg"></p>

</div>

<!-- ================= FILTER + TABLE CARD ================= -->
<div class="card">

<h3 class="section-title">🔎 Filters</h3>

<div class="table-container">

<table>

<thead>

<!-- FILTER ROW -->
<tr>
<th>
<select id="f_project" onchange="filterTable()">
<option value="">All</option>
<option value="1">Sadayem</option>
<option value="2">Makkah</option>
<option value="3">Madinah</option>
</select>
</th>

<th>
<select id="f_work" onchange="filterTable()">
<option value="">All</option>
<option>Concrete & Masonry</option>
<option>Masonry</option>
<option>Plaster</option>
<option>Paint</option>
<option>Tiles</option>
<option>Insulation</option>
<option>Electrical</option>
<option>Mechanical</option>
</select>
</th>

<th><select id="f_name" onchange="filterTable()"><option value="">All</option></select></th>
<th><select id="f_contract" onchange="filterTable()"><option value="">All</option></select></th>
<th><select id="f_company" onchange="filterTable()"><option value="">All</option></select></th>
<th><select id="f_phone" onchange="filterTable()"><option value="">All</option></select></th>
<th><select id="f_email" onchange="filterTable()"><option value="">All</option></select></th>
<th><select id="f_vat" onchange="filterTable()"><option value="">All</option></select></th>
<th><select id="f_cr" onchange="filterTable()"><option value="">All</option></select></th>
<th><select id="f_iban" onchange="filterTable()"><option value="">All</option></select></th>
<th></th>
</tr>

<!-- HEADER -->
<tr>
<th>Project</th>
<th>Work Type</th>
<th>Name</th>
<th>Contract</th>
<th>Company</th>
<th>Phone</th>
<th>Email</th>
<th>VAT</th>
<th>CR</th>
<th>Adv. Amount</th>
<th>Actions</th>
</tr>

</thead>

<tbody id="table"></tbody>

</table>

</div>

</div>

</div>

</body>
</html>
