<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><title>Subcontractors</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>body{margin:0;background:var(--night);}</style>
</head>
<body>
<div style="padding:0 24px 32px;">

  <div class="page-hd">
    <div><div class="page-title">👷 Subcontractor Records</div><div class="page-sub">Manage subcontractor accounts, contracts and advance payments</div></div>
  </div>

  <!-- Form -->
  <div class="prem-card">
    <div class="prem-grid">

      <!-- LEFT -->
      <div class="form-sec">
        <div class="sec-title">Account Opening Detail</div>
        <div style="display:flex;flex-direction:column;gap:11px;">
          <div><label>Project</label><select id="project"><option value="" disabled selected></option><option>Sadayem</option><option>Makkah</option><option>Madinah</option></select></div>
          <div><label>Work Type</label><select id="work_type"><option value="" disabled selected></option><option>Concrete &amp; Masonry</option><option>Masonry</option><option>Plaster</option><option>Paint</option><option>Tiles</option><option>Insulation</option><option>Electrical</option><option>Mechanical</option></select></div>
          <div><label>Retention %</label><select id="retention_percent"><option value="10">10%</option><option value="5">5%</option><option value="0">0%</option></select></div>
          <div><label>VAT %</label><select id="vat_percent"><option value="15">15%</option><option value="0">0%</option></select></div>
          <div class="cb-box"><label><input type="checkbox" id="has_advance"><span>Has Advance Payment</span></label></div>
          <div><label>Advance Amount</label><input id="advance_amount" placeholder="0.00"></div>
        </div>
      </div>

      <!-- RIGHT -->
      <div class="form-sec">
        <div class="sec-title">Contract Details</div>
        <div style="display:flex;flex-direction:column;gap:11px;">
          <div><label>Contract No</label><input id="contract_no" placeholder="e.g. SC-2024-001"></div>
          <div><label>Company Name</label><input id="company" placeholder="Company name"></div>
          <div><label>Email</label><input type="email" id="email" placeholder="contact@company.com"><div id="email_error">Invalid email format</div></div>
          <div><label>CR Number</label><input id="cr" placeholder="Commercial registration"></div>
          <div><label>VAT Number</label><input id="vat_number" placeholder="Tax registration number"></div>
        </div>
      </div>

      <!-- FULL -->
      <div class="form-sec full">
        <div class="sec-title">Site Supervisor Detail</div>
        <div class="form-row">
          <div><label>Subcontractor Name</label><input id="subcontractor_name" placeholder="Full name"></div>
          <div><label>Phone</label><input id="phone" placeholder="+966 5x xxx xxxx"></div>
          <div></div>
        </div>
      </div>

      <!-- Actions -->
      <div class="form-actions">
        <p id="msg"></p>
        <button id="mainBtn" class="btn-primary btn-full" onclick="save()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add Subcontractor</button>
      </div>

    </div>
  </div>

  <!-- Table -->
  <div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;">
      <span style="font-size:12px;font-weight:600;color:var(--text2)">Subcontractor Directory</span>
    </div>
    <div class="table-box">
      <table>
        <thead>
          <tr>
            <th><select id="f_project" onchange="filterTable()"><option value="">All</option><option value="Sadayem">Sadayem</option><option value="Makkah">Makkah</option><option value="Madinah">Madinah</option></select></th>
            <th><select id="f_work" onchange="filterTable()"><option value="">All</option><option>Concrete &amp; Masonry</option><option>Masonry</option><option>Plaster</option><option>Paint</option><option>Tiles</option><option>Insulation</option><option>Electrical</option><option>Mechanical</option></select></th>
            <th><select id="f_name" onchange="filterTable()"><option value="">All</option></select></th>
            <th><select id="f_contract" onchange="filterTable()"><option value="">All</option></select></th>
            <th><select id="f_company" onchange="filterTable()"><option value="">All</option></select></th>
            <th><select id="f_phone" onchange="filterTable()"><option value="">All</option></select></th>
            <th><select id="f_email" onchange="filterTable()"><option value="">All</option></select></th>
            <th><select id="f_vat" onchange="filterTable()"><option value="">All</option></select></th>
            <th><select id="f_cr" onchange="filterTable()"><option value="">All</option></select></th>
            <th><select id="f_iban" onchange="filterTable()"><option value="">All</option></select></th>
            <th></th>
          </tr>
          <tr>
            <th>Project</th><th>Work Type</th><th>Name</th><th>Contract</th>
            <th>Company</th><th>Phone</th><th>Email</th><th>VAT No</th>
            <th>CR No</th><th>Advance Remaining</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="table"></tbody>
      </table>
    </div>
  </div>
</div>
</body>
</html>
