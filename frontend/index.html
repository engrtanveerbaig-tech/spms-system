<!DOCTYPE html>
<html>
<head>
<title>SPMS System</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    background: #1f4e79;
    color: white;
    height: 100vh;
    padding: 20px;
    display: flex;
    flex-direction: column;
}

.logo {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 20px;
}

.menu-item {
    display: block;
    padding: 10px;
    cursor: pointer;
    border-radius: 5px;
    margin-bottom: 10px;
}

.menu-item:hover {
    background: #163b5c;
}

/* MAIN CONTENT */
.content {
    flex: 1;
    padding: 20px;
    background: #f5f7fa;
}

/* LOGOUT BUTTON */
.logout {
    margin-top: auto;
    padding: 10px;
    background: red;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}

.logout:hover {
    background: darkred;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">SPMS</div>

    <div class="menu-item" onclick="loadPage('dashboard.html')">📊 Dashboard</div>
    <div class="menu-item" id="subMenu" onclick="loadPage('subcontractor.html')">👷 Subcontractor</div>
    <div class="menu-item" id="payMenu" onclick="loadPage('payment.html')">💰 Payments</div>

    <button class="logout" onclick="logout()">Logout</button>
</div>

<!-- MAIN PANEL -->
<div class="content" id="mainContent">
    Loading...
</div>

<script src="./js/app.js"></script>

</body>
</html>
