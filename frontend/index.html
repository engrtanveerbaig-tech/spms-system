<!DOCTYPE html>
<html>
<head>
<title>SPMS System</title>

<!-- ✅ EXTERNAL CSS -->
<script>
if (!localStorage.getItem("role")) {
    window.location.href = "login.html";
}
</script>
<style>
    /* ================= GLOBAL ================= */
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    display: flex;
}

/* ================= PREMIUM SIDEBAR ================= */
.sidebar {
    position: fixed;
    top: 0;
    left: 0;
    width: 80px;
    height: 100vh;

    /* 🔥 SAME AS LOGIN */
    background: linear-gradient(180deg, #7c1d6f, #db2777);

    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 10px;

    /* 🔥 PREMIUM SHADOW */
    box-shadow: 6px 0 25px rgba(0,0,0,0.4);
}
/* ICON CONTAINER */
.sidebar-content {
    display: flex;
    flex-direction: column;
    gap: 18px;
    align-items: center;
}

/* LOGO TEXT */
.logo {
    margin-top: auto;
    margin-bottom: 20px;
    font-size: 24px;
    font-weight: bold;
    color: #94a3b8;
    text-align: center;
    line-height: 1.5;
}

/* ICON BUTTON */
.menu-item {
    width: 52px;
    height: 52px;

    display: flex;
    align-items: center;
    justify-content: center;

    border-radius: 16px;
    font-size: 22px;
    cursor: pointer;

    background: rgba(255,255,255,0.15);

    backdrop-filter: blur(10px);

    transition: 0.3s;
}

/* HOVER EFFECT */
.menu-item:hover {
    transform: translateY(-3px) scale(1.05);
    background: linear-gradient(135deg, #3b82f6, #22c55e);
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}
/* ACTIVE ICON */
.menu-item.active {
    background: linear-gradient(135deg, #3b82f6, #22c55e);
    box-shadow: 0 0 15px rgba(59,130,246,0.6);
}

/* ICON STYLE */
.menu-item span {
    pointer-events: none;
}
/* ================= CONTENT ================= */
.content {
    margin-left: 80px;   /* 🔥 IMPORTANT FIX */
    padding: 20px;
    background: #f5f7fa;
}

/* LOGOUT BUTTON */
.logout {
    width: 100%;
    padding: 10px;
    border-radius: 12px;

    background: rgba(0,0,0,0.2);
    border: none;
    color: white;
    cursor: pointer;

    transition: 0.3s;
}

.logout:hover {
    background: white;
    color: #db2777;
}

/* ================= SEARCH MODAL ================= */
.search-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 99999;
}

/* ===== BOX ===== */
.search-box {
    background: rgba(255,255,255,0.08);   /* 🔥 transparent */
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);

    border-radius: 50px;
    width: 520px;
    max-width: 90%;

    padding: 25px;

    border: 1px solid rgba(255,255,255,0.15);

    box-shadow: 
        0 8px 32px rgba(0,0,0,0.3),
        inset 0 1px 0 rgba(255,255,255,0.1);
     position: relative;   
}

/* ===== SEARCH TYPE TOGGLE ===== */
.search-type-toggle {
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 4px;
}
.search-type-toggle button {
    background: transparent;
    color: rgba(255,255,255,0.6);
    border-radius: 50px;
}
.search-type-toggle button.active {
    background: linear-gradient(135deg, #3b82f6, #22c55e);
    color: white;
}
/* ================= INPUT ================= */
/* ===== INPUT ===== */
.search-box input {
    width: 90%;              /* 🔥 reduce width */
    margin: 15px auto;       /* 🔥 center inside box */
    display: block;

    padding: 12px 16px;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);

    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 50px;

    color: white;
    font-size: 15px;

    direction: rtl;          /* 🔥 Arabic fix */
    text-align: right;

    line-height: 1.8;        /* 🔥 spacing fix */

    outline: none;
}
.sidebar-bottom {
    margin-top: auto;
    width: 100%;
}
.search-box input::placeholder {
    color: rgba(255,255,255,0.6);
}

.search-box input:focus {
    border-color: #3b82f6;
    box-shadow: 0 0 10px rgba(59,130,246,0.5);
}

.search-box input:focus {
    border-color: #1f4e79;
    box-shadow: 0 0 6px rgba(31,78,121,0.4);
}

/* ===== SUGGESTIONS ===== */
#popupSuggestions {
    width: 95%;
    margin: 0 auto;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    color: #f5f7fa;

    border-radius: 0px;
    border: 1px solid rgba(255,255,255,0.15);

    max-height: 180px;
    overflow-y: auto;

    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}


#popupSuggestions div {
    padding: 10px 16px;

    font-size: 14px;
    line-height: 1.8;

    direction: rtl;
    text-align: right;

    border-bottom: 1px solid rgba(255,255,255,0.08);

    transition: 0.2s;
}

#popupSuggestions div:last-child {
    border-bottom: none;
}

#popupSuggestions div:hover {
    background: linear-gradient(135deg, rgba(59,130,246,0.3), rgba(34,197,94,0.3));
}



/* ================= BUTTONS ================= */
.search-footer {
    margin-top: 20px;
}

/* ===== BUTTON ===== */
.search-footer {
    margin-top: 15px;
    text-align: center;
}
.search-footer button {
    margin-top: 10px;

    padding: 10px 24px;
    border-radius: 12px;

    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);

    color: white;

    transition: 0.3s;
}

.search-footer button:hover {
    background: linear-gradient(135deg, #3b82f6, #22c55e);
}
.sidebar-content::-webkit-scrollbar {
    width: 6px;
}
.sidebar-content::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.3);
    border-radius: 4px;
}

/* ================= ANIMATIONS ================= */
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* ===== ANIMATION ===== */
@keyframes scaleIn {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}
</style>
</head>

<body>



<!-- SIDEBAR -->
<div class="sidebar">

    

    <!-- 🔥 SCROLLABLE AREA -->
    <div class="sidebar-content">

    <div class="menu-item active" onclick="loadPage('dashboard.html')">
        <span>📊</span>
    </div>

    <div class="menu-item" onclick="openSearchModal()">
        <span>🔍</span>
    </div>

    <div id="subMenu" class="menu-item" onclick="loadPage('subcontractor.html')">
        <span>👷</span>
    </div>

    <div id="payMenu" class="menu-item" onclick="loadPage('payment.html')">
        <span>💰</span>
    </div>

    <div class="menu-item" onclick="toggleTheme()">
        <span>🌙</span>
    </div>

</div>
    <div class="logo">S<br>P<br>S</div>

<div class="sidebar-bottom">
    <button class="logout" onclick="logout()">Logout</button>
</div>

</div>

<!-- MAIN PANEL -->
<div class="content">

    <!-- 🔥 SCROLLABLE PAGE WRAPPER -->
    <div class="page-container">

        <!-- PAGE CONTENT (DYNAMIC LOAD) -->
        <div id="mainContent">
            Loading...
        </div>

    </div>

</div>

<!-- 🔍 SEARCH MODAL -->
<!-- 🔍 SEARCH MODAL -->
<div id="searchModal" class="search-modal">

    <div class="search-box">

        <!-- 🔥 SEARCH TYPE SELECT -->
        <div class="search-type-toggle">
            <button id="btnCompany" class="active" onclick="setSearchType('company')">
                Company
            </button>
            <button id="btnSubcontractor" onclick="setSearchType('subcontractor')">
                Subcontractor
            </button>
        </div>

        <!-- 🔍 INPUT -->
        <input 
            type="text" 
            id="popupSearchInput" 
            placeholder="Type to search..."
            oninput="handlePopupSearch()"
        >

        <!-- 📋 SUGGESTIONS -->
        <div id="popupSuggestions"></div>

        <!-- 🔘 ACTION -->
        <div class="search-footer">
            <button onclick="confirmSearch()">Search / بحث</button>
        </div>

    </div>

</div>

<!-- JS -->
<script src="./js/app.js"></script>

<!-- 🔐 ROLE CONTROL -->
<script>

if (localStorage.getItem("role") === "viewer") {

    const sub = document.getElementById("subMenu");
    const pay = document.getElementById("payMenu");

    if (sub) sub.style.display = "none";
    if (pay) pay.style.display = "none";
}
document.getElementById("searchModal").addEventListener("click", function(e){
    if (e.target.id === "searchModal") {
        closeSearchModal();
    }
});

// ✅ APPLY SAVED THEME
if (savedTheme === "dark") {
    document.body.classList.add("dark-mode");
}
</script>

</body>
</html>
