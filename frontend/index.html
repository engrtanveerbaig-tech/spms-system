<!DOCTYPE html>
<html>
<head>
<title>SPMS System</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    background: #1f4e79;
    color: white;
    height: 100vh;
    padding: 20px;
    display: flex;
    flex-direction: column;
}

.logo {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 50px;
}

.menu-item {
    display: block;
    padding: 10px;
    cursor: pointer;
    border-radius: 5px;
    margin-bottom: 10px;
}

.menu-item:hover {
    background: #163b5c;
}

/* MAIN CONTENT */
.content {
    flex: 1;
    padding: 20px;
    background: #f5f7fa;
}

/* SEARCH BAR */
.search-container {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
    position: relative;
}

.search-container select,
.search-container input {
    padding: 8px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

/* SUGGESTIONS */
#searchSuggestions {
    position: absolute;
    top: 40px;
    left: 150px;
    right: 0;
    background: white;
    border: 1px solid #ccc;
    max-height: 200px;
    overflow-y: auto;
    display: none;
    z-index: 999;
}

#searchSuggestions div {
    padding: 8px;
    cursor: pointer;
}

#searchSuggestions div:hover {
    background: #f0f0f0;
}

/* LOGOUT BUTTON */
.logout {
    margin-top: auto;
    padding: 10px;
    background: red;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}

.logout:hover {
    background: darkred;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">SPMS</div>

    <div class="menu-item" onclick="loadPage('dashboard.html')">📊</div>
    <div class="menu-item" id="subMenu" onclick="loadPage('subcontractor.html')">👷</div>
    <div class="menu-item" id="payMenu" onclick="loadPage('payment.html')">💰</div>

    <button class="logout" onclick="logout()">Logout</button>
</div>

<!-- MAIN PANEL -->
<div class="content">

    <!-- 🔍 GLOBAL SEARCH -->
    <div class="search-container">

        <select id="searchType">
            <option value="company">Company</option>
            <option value="subcontractor">Subcontractor</option>
        </select>

        <input 
            type="text" 
            id="globalSearch" 
            placeholder="Search company or subcontractor..."
            oninput="handleSearchInput()"
        >

        <div id="searchSuggestions"></div>

    </div>

    <!-- PAGE CONTENT -->
    <div id="mainContent">
        Loading...
    </div>

</div>

<script src="./js/app.js"></script>

<!-- 🔐 ROLE CONTROL -->
<script>
const role = localStorage.getItem("role");

if (role === "viewer") {
    const sub = document.getElementById("subMenu");
    const pay = document.getElementById("payMenu");

    if (sub) sub.style.display = "none";
    if (pay) pay.style.display = "none";
}
</script>

</body>
</html>
