<!DOCTYPE html>
<html>
<head>
<title>SPMS System</title>

<!-- ✅ EXTERNAL CSS -->

<style>
    /* ================= GLOBAL ================= */
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    display: flex;
}

/* ================= SIDEBAR ================= */
.sidebar {
    width: 220px;
    background: #1f4e79;
    color: white;

    height: 100vh;
    padding: 20px;

    display: flex;
    flex-direction: column;

    overflow: hidden; /* ✅ prevent overflow issues */
}
.sidebar-content {
    flex: 1;
    overflow-y: auto; /* ✅ scroll only menu, not logout */
}

.logo {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 50px;
}

.menu-item {
    display: block;
    padding: 12px;
    cursor: pointer;
    border-radius: 6px;
    margin-bottom: 12px;
    font-size: 18px;
    text-align: center;
    transition: 0.2s;
}

.menu-item:hover {
    background: #163b5c;
    transform: scale(1.05);
}

/* ================= CONTENT ================= */
.content {
    flex: 1;
    padding: 20px;
    background: #f5f7fa;
}

/* ================= LOGOUT ================= */
.logout {
    margin-top: auto;   /* ✅ push to bottom */
    padding: 12px;
    background: red;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 6px;

    width: 100%;        /* ✅ full width */
    position: sticky;   /* ✅ always visible */
    bottom: 0;
}

.logout:hover {
    background: darkred;
}

/* ================= SEARCH MODAL ================= */
/* ===== MODAL BACKGROUND ===== */
.search-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 99999;
}

/* ===== BOX ===== */
.search-box {
    background: #ffffff;
    padding: 25px;
    border-radius: 14px;
    width: 520px;
    max-width: 90%;
    box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    animation: scaleIn 0.25s ease;
}
/* ===== SEARCH TYPE TOGGLE ===== */
.search-type-toggle {
    display: flex;
    margin-bottom: 15px;
    background: #f1f3f5;
    border-radius: 8px;
    overflow: hidden;
}
.search-type-toggle button {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    cursor: pointer;
    font-weight: 500;
    transition: 0.2s;
}
.search-type-toggle button.active {
    background: #1f4e79;
    color: white;
}
/* ================= INPUT ================= */
/* ===== INPUT ===== */
.search-box input {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    border: 1px solid #000000;
    border-radius: 8px;
    outline: none;
    transition: 0.2s;
}

.search-box input:focus {
    border-color: #1f4e79;
    box-shadow: 0 0 6px rgba(31,78,121,0.4);
}

/* ===== SUGGESTIONS ===== */
#popupSuggestions {
    margin-top: 10px;
    max-height: 250px;
    overflow-y: auto;
    border-radius: 8px;
    border: 1px solid #000000;
}

/* ITEM */
#popupSuggestions div {
    padding: 10px 12px;
    cursor: pointer;
    border-bottom: 1px solid #000000;
    transition: 0.2s;
}

/* HOVER */
#popupSuggestions div:hover {
    background: #1f4e79;
    color: white;
}

/* ================= BUTTONS ================= */
.search-footer {
    margin-top: 20px;
}

/* ===== BUTTON ===== */
.search-footer {
    margin-top: 15px;
    text-align: center;
}
.search-footer button {
    padding: 10px 20px;
    border: none;
    background: #1f4e79;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
}

.search-footer button:hover {
    background: #163b5c;
}
.sidebar-content::-webkit-scrollbar {
    width: 6px;
}
.sidebar-content::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.3);
    border-radius: 4px;
}

/* ================= ANIMATIONS ================= */
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* ===== ANIMATION ===== */
@keyframes scaleIn {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <div class="logo">SPMS</div>

    <!-- 🔥 SCROLLABLE AREA -->
    <div class="sidebar-content">

        <div class="menu-item" onclick="loadPage('dashboard.html')">📊</div>
        <div class="menu-item" onclick="loadPage('subcontractor.html')">👷</div>
        <div class="menu-item" onclick="loadPage('payment.html')">💰</div>
        <div class="menu-item" onclick="openSearchModal()">🔍</div>

    </div>

    <!-- 🔥 ALWAYS AT BOTTOM -->
    <button class="logout" onclick="logout()">Logout</button>

</div>

<!-- MAIN PANEL -->
<div class="content">

    <!-- PAGE CONTENT -->
    <div id="mainContent">
        Loading...
    </div>

</div>

<!-- 🔍 SEARCH MODAL -->
<!-- 🔍 SEARCH MODAL -->
<div id="searchModal" class="search-modal">

    <div class="search-box">

        <!-- 🔥 SEARCH TYPE SELECT -->
        <div class="search-type-toggle">
            <button id="btnCompany" class="active" onclick="setSearchType('company')">
                Company
            </button>
            <button id="btnSubcontractor" onclick="setSearchType('subcontractor')">
                Subcontractor
            </button>
        </div>

        <!-- 🔍 INPUT -->
        <input 
            type="text" 
            id="popupSearchInput" 
            placeholder="Type to search..."
            oninput="handlePopupSearch()"
        >

        <!-- 📋 SUGGESTIONS -->
        <div id="popupSuggestions"></div>

        <!-- 🔘 ACTION -->
        <div class="search-footer">
            <button onclick="confirmSearch()">Search</button>
        </div>

    </div>

</div>

<!-- JS -->
<script src="./js/app.js"></script>

<!-- 🔐 ROLE CONTROL -->
<script>


if (role === "viewer") {
    const sub = document.getElementById("subMenu");
    const pay = document.getElementById("payMenu");

    if (sub) sub.style.display = "none";
    if (pay) pay.style.display = "none";
}
document.getElementById("searchModal").addEventListener("click", function(e){
    if (e.target.id === "searchModal") {
        closeSearchModal();
    }
});
</script>

</body>
</html>
