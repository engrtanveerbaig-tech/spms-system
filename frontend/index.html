<!DOCTYPE html>
<html>
<head>
<title>SPMS System</title>

<!-- ✅ EXTERNAL CSS -->
<script>
if (!localStorage.getItem("role")) {
    window.location.href = "login.html";
}
</script>
<style>
    /* ================= GLOBAL ================= */
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    display: flex;
}

/* ================= PREMIUM SIDEBAR ================= */
.sidebar{
    position: fixed;
    top: 0;
    left: 0;
    width: 80px;
    height: 100vh;

    background: linear-gradient(180deg, #7c1d6f, #db2777);

    display: flex;
    flex-direction: column;
    justify-content: space-between; /* 🔥 KEY FIX */

    padding: 20px 10px;

    box-shadow: 6px 0 25px rgba(0,0,0,0.4);
}
/* ICON CONTAINER */
.sidebar-content {
    display: flex;
    flex-direction: column;
    gap: 18px;
    align-items: center;
}

/* LOGO TEXT */
.logo{
    writing-mode: vertical-rl;
    transform: rotate(180deg);

    font-size: 14px;
    font-weight: bold;
    letter-spacing: 6px;

    color: rgba(255,255,255,0.6);
}
.logout-icon{
    background: rgba(239,68,68,0.2);
}

.logout-icon:hover{
    background: linear-gradient(135deg,#ef4444,#dc2626);
}

/* ICON BUTTON */
.menu-item {
    width: 52px;
    height: 52px;

    display: flex;
    align-items: center;
    justify-content: center;

    border-radius: 16px;
    font-size: 22px;
    cursor: pointer;

    background: rgba(255,255,255,0.15);

    backdrop-filter: blur(10px);

    transition: 0.3s;
}

/* HOVER EFFECT */
.menu-item:hover {
    transform: translateY(-3px) scale(1.05);
    background: linear-gradient(135deg, #3b82f6, #22c55e);
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}
/* ACTIVE ICON */
.menu-item.active {
    background: linear-gradient(135deg, #3b82f6, #22c55e);
    box-shadow: 0 0 15px rgba(59,130,246,0.6);
}

/* ICON STYLE */
.menu-item span {
    pointer-events: none;
}
/* ================= CONTENT ================= */
.content {
    margin-left: 80px;   /* 🔥 IMPORTANT FIX */
    padding: 20px;
    background: var(--card-bg);
}

/* LOGOUT BUTTON */
.logout {
    width: 100%;
    padding: 10px;
    border-radius: 12px;

    background: rgba(0,0,0,0.2);
    border: none;
    color: white;
    cursor: pointer;

    transition: 0.3s;
}

.logout:hover {
    background: var(--card-bg);
    color: #db2777;
}

/* ================= SEARCH MODAL ================= */
.search-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 99999;
}

/* ===== BOX ===== */
.search-box {
    background: rgba(255,255,255,0.08);   /* 🔥 transparent */
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);

    border-radius: 50px;
    width: 520px;
    max-width: 90%;

    padding: 25px;

    border: 1px solid rgba(255,255,255,0.15);

    box-shadow: 
        0 8px 32px rgba(0,0,0,0.3),
        inset 0 1px 0 rgba(255,255,255,0.1);
     position: relative;   
}

/* ===== SEARCH TYPE TOGGLE ===== */
.search-type-toggle {
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 4px;
}
.search-type-toggle button {
    background: transparent;
    color: rgba(255,255,255,0.6);
    border-radius: 50px;
}
.search-type-toggle button.active {
    background: linear-gradient(135deg, #3b82f6, #22c55e);
    color: white;
}

/* ===== INPUT ===== */
.search-box input {
    width: 90%;              /* 🔥 reduce width */
    margin: 15px auto;       /* 🔥 center inside box */
    display: block;

    padding: 12px 16px;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);

    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 50px;

    color: white;
    font-size: 15px;

    direction: rtl;          /* 🔥 Arabic fix */
    text-align: right;

    line-height: 1.8;        /* 🔥 spacing fix */

    outline: none;
}
.sidebar-bottom{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:12px;

    margin-bottom:40px; /* 🔥 moves logout UP */
}
.search-box input::placeholder {
    color: rgba(255,255,255,0.6);
}

.search-box input:focus {
    border-color: #3b82f6;
    box-shadow: 0 0 10px rgba(59,130,246,0.5);
}

.search-box input:focus {
    border-color: #1f4e79;
    box-shadow: 0 0 6px rgba(31,78,121,0.4);
}

/* ===== SUGGESTIONS ===== */
#popupSuggestions {
    width: 95%;
    margin: 0 auto;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    color: #f5f7fa;

    border-radius: 0px;
    border: 1px solid rgba(255,255,255,0.15);

    max-height: 180px;
    overflow-y: auto;

    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}
/* ================= PREMIUM SEARCH HIGHLIGHT ================= */
.highlight {
    position: relative;
    display: inline-block;

    padding: 2px 6px;
    border-radius: 6px;

    font-weight: 600;
    color: #0f172a;

    /* 🔥 GRADIENT GOLD */
    background: linear-gradient(135deg, #fde68a, #f59e0b);

    /* 🔥 SOFT GLOW */
    box-shadow:
        0 2px 6px rgba(245,158,11,0.4),
        0 0 10px rgba(251,191,36,0.5);

    /* 🔥 GLASS EFFECT */
    backdrop-filter: blur(4px);

    /* 🔥 SMOOTH ANIMATION */
    animation: highlightFade 0.3s ease;
}

/* ✨ ENTRY ANIMATION */
@keyframes highlightFade {
    from {
        opacity: 0;
        transform: scale(0.9);
    }
    to {
        opacity: 1;
        transform: scale(1);
    }
}

/* 🔥 HOVER BOOST */
.highlight:hover {
    background: linear-gradient(135deg, #facc15, #f97316);
    box-shadow:
        0 4px 12px rgba(245,158,11,0.6),
        0 0 14px rgba(251,191,36,0.8);

    transform: scale(1.05);
}

/* 🌙 DARK MODE SUPPORT */
body.dark-mode .highlight {
    color: #020617;

    background: linear-gradient(135deg, #facc15, #f97316);

    box-shadow:
        0 2px 8px rgba(251,191,36,0.6),
        0 0 12px rgba(249,115,22,0.6);
}

#popupSuggestions div {
    padding: 10px 16px;

    font-size: 14px;
    line-height: 1.8;

    direction: rtl;
    text-align: right;

    border-bottom: 1px solid rgba(255,255,255,0.08);

    transition: 0.2s;
}

#popupSuggestions div:last-child {
    border-bottom: none;
}

#popupSuggestions div:hover {
    background: linear-gradient(135deg, rgba(59,130,246,0.3), rgba(34,197,94,0.3));
}



/* ================= BUTTONS ================= */
.search-footer {
    margin-top: 20px;
}

/* ===== BUTTON ===== */
.search-footer {
    margin-top: 15px;
    text-align: center;
}
.search-footer button {
    margin-top: 10px;

    padding: 10px 24px;
    border-radius: 12px;

    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);

    color: white;

    transition: 0.3s;
}

.search-footer button:hover {
    background: linear-gradient(135deg, #3b82f6, #22c55e);
}
.sidebar-content::-webkit-scrollbar {
    width: 6px;
}
.sidebar-content::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.3);
    border-radius: 4px;
}

/* ================= ANIMATIONS ================= */
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* ===== ANIMATION ===== */
@keyframes scaleIn {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

/* ===== DARK MODE FULL FIX ===== */
body.dark-mode .content{
    background:#020617;
}

body.dark-mode .sidebar{
    background:linear-gradient(180deg,#020617,#0f172a);
}

body.dark-mode .logo{
    color:#94a3b8;
}

body.dark-mode .menu-item{
    background:rgba(255,255,255,0.05);
}

body.dark-mode .menu-item:hover{
    background:linear-gradient(135deg,#3b82f6,#22c55e);
}

body.dark-mode .search-box{
    background:rgba(0,0,0,0.4);
}

body.dark-mode #popupSuggestions{
    background:rgba(0,0,0,0.6);
}
/* ===== SEARCH ICON ACTIVE ===== */
.menu-item[onclick*="openSearchModal"]{
    position:relative;
}

/* ACTIVE STATE */
.menu-item.search-active{
    background:linear-gradient(135deg,#22c55e,#3b82f6);
    box-shadow:0 0 15px rgba(34,197,94,0.6);
}

/* GLOW EFFECT */
.menu-item[onclick*="openSearchModal"]:hover{
    box-shadow:0 0 20px rgba(59,130,246,0.6);
}

.logout-btn{
    margin-left:auto;
    background:linear-gradient(135deg,#ef4444,#dc2626);
    color:white;
    padding:8px 14px;
    border-radius:10px;
    font-size:13px;
    cursor:pointer;
    transition:0.3s;
}

.logout-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}
</style>
</head>

<body>



<!-- SIDEBAR -->
<div class="sidebar">

    
<div class="sidebar-content">

    <div class="menu-item active" onclick="loadPage('dashboard.html')">📊</div>
    <div class="menu-item" onclick="openSearchModal()">🔍</div>
    <div id="subMenu" class="menu-item" onclick="loadPage('subcontractor.html')">👷</div>
    <div id="payMenu" class="menu-item" onclick="loadPage('payment.html')">💰</div>
    <div class="menu-item" onclick="toggleTheme()">🌙</div>

</div>

<!-- 🔥 BOTTOM SECTION -->
<div class="sidebar-bottom">

    <div class="logo">SPMS</div>

    <div class="menu-item logout-icon" onclick="logout()">🚪</div>

</div>
</div>

<!-- MAIN PANEL -->
<div class="content">

    <!-- 🔥 SCROLLABLE PAGE WRAPPER -->
    <div class="page-container">

        <!-- PAGE CONTENT (DYNAMIC LOAD) -->
        <div id="mainContent">
            Loading...
        </div>

    </div>

</div>

<!-- 🔍 SEARCH MODAL -->
<!-- 🔍 SEARCH MODAL -->
<div id="searchModal" class="search-modal">

    <div class="search-box">

        <!-- 🔥 SEARCH TYPE SELECT -->
        <div class="search-type-toggle">
            <button id="btnCompany" class="active" onclick="setSearchType('company')">
                Company
            </button>
            <button id="btnSubcontractor" onclick="setSearchType('subcontractor')">
                Subcontractor
            </button>
        </div>

        <!-- 🔍 INPUT -->
        <input 
            type="text" 
            id="popupSearchInput" 
            placeholder="Type to search..."
            oninput="handlePopupSearch()"
        >

        <!-- 📋 SUGGESTIONS -->
        <div id="popupSuggestions"></div>

        <!-- 🔘 ACTION -->
        <div class="search-footer">
            <button onclick="confirmSearch()">Search / بحث</button>
        </div>

    </div>

</div>

<!-- JS -->
<!-- html2pdf (GLOBAL LOAD - REQUIRED) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<!-- MAIN APP -->
<script src="./js/app.js"></script>

<!-- 🔐 ROLE CONTROL -->
<script>

if (localStorage.getItem("role") === "viewer") {

    const sub = document.getElementById("subMenu");
    const pay = document.getElementById("payMenu");

    if (sub) sub.style.display = "none";
    if (pay) pay.style.display = "none";
}
document.getElementById("searchModal").addEventListener("click", function(e){
    if (e.target.id === "searchModal") {
        closeSearchModal();
    }
});
</script>
</body>
</html>
