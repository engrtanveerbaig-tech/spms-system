<!DOCTYPE html>
<html>
<head>
<title>SPMS System</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    background: #1f4e79;
    color: white;
    height: 100vh;
    padding: 20px;
}

.menu-item {
    display: block;
    padding: 10px;
    cursor: pointer;
    border-radius: 5px;
    text-decoration: none;
    color: white;
}

.menu-item:hover {
    background: #163b5c;
}

/* MAIN CONTENT */
.content {
    flex: 1;
    padding: 20px;
    background: #f5f7fa;
}

.logout {
    margin-top: 20px;
    padding: 10px;
    background: red;
    border: none;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <h2>SPMS</h2>

    <a id="menu-dashboard" class="menu-item" onclick="loadPage('dashboard.html')">📊 Dashboard</a>
    <a id="menu-subcontractor" class="menu-item" onclick="loadPage('subcontractor.html')">👷 Subcontractor</a>
    <a id="menu-payment" class="menu-item" onclick="loadPage('payment.html')">💰 Payments</a>

    <button class="logout" onclick="logout()">Logout</button>

</div>

<!-- MAIN PANEL -->
<div class="content" id="mainContent">
    Loading...
</div>

<script src="./js/app.js"></script>

<!-- ================= ROLE CONTROL ================= -->
<script>
const role = localStorage.getItem("role");

if (role === "viewer") {
    document.getElementById("menu-subcontractor").style.display = "none";
    document.getElementById("menu-payment").style.display = "none";
}
</script>

</body>
</html>
