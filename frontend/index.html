<!DOCTYPE html>
<html>
<head>
<title>SPMS System</title>

<!-- ✅ EXTERNAL CSS -->

<style>
    /* ================= GLOBAL ================= */
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    display: flex;
}

/* ================= SIDEBAR ================= */
.sidebar {
    width: 220px;
    background: #1f4e79;
    color: white;
    height: 100vh;
    padding: 20px;
    display: flex;
    flex-direction: column;
}

.logo {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 50px;
}

.menu-item {
    display: block;
    padding: 12px;
    cursor: pointer;
    border-radius: 6px;
    margin-bottom: 12px;
    font-size: 18px;
    text-align: center;
    transition: 0.2s;
}

.menu-item:hover {
    background: #163b5c;
    transform: scale(1.05);
}

/* ================= CONTENT ================= */
.content {
    flex: 1;
    padding: 20px;
    background: #f5f7fa;
}

/* ================= LOGOUT ================= */
.logout {
    margin-top: auto;
    padding: 10px;
    background: red;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 5px;
    transition: 0.2s;
}

.logout:hover {
    background: darkred;
}

/* ================= SEARCH MODAL ================= */
.search-modal {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;

    background: rgba(0, 0, 0, 0.35);
    backdrop-filter: blur(6px);

    display: none;
    justify-content: center;
    align-items: center;

    z-index: 99999;

    animation: fadeIn 0.3s ease;
}

/* ================= SEARCH BOX ================= */
.search-box {
    background: white;
    padding: 30px;
    border-radius: 12px;
    width: 500px;
    max-width: 90%;
    text-align: center;

    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    animation: scaleIn 0.25s ease;
}

/* ================= INPUT ================= */
.search-box input {
    width: 100%;
    padding: 14px;
    font-size: 18px;
    border: 1px solid #ccc;
    border-radius: 8px;

    outline: none;
    transition: 0.2s;
}

.search-box input:focus {
    border-color: #1f4e79;
    box-shadow: 0 0 5px rgba(31, 78, 121, 0.4);
}

/* ================= SUGGESTIONS ================= */
#popupSuggestions {
    margin-top: 10px;
    max-height: 220px;
    overflow-y: auto;
    text-align: left;
    border: 1px solid #ddd;
    background: white;
    position: relative;
    z-index: 99999;
}

#popupSuggestions div {
    padding: 10px;
    cursor: pointer;
    border-bottom: 1px solid #eee;
    font-size: 14px;
}

#popupSuggestions div:hover {
    background: #f0f4f8;
}

/* ================= BUTTONS ================= */
.search-footer {
    margin-top: 20px;
}

.search-footer button {
    padding: 10px 18px;
    margin: 5px;
    border: none;
    background: #1f4e79;
    color: white;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    transition: 0.2s;
}

.search-footer button:hover {
    background: #163b5c;
}

/* ================= ANIMATIONS ================= */
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes scaleIn {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">SPMS</div>

    <div class="menu-item" onclick="loadPage('dashboard.html')">📊</div>
    <div class="menu-item" id="subMenu" onclick="loadPage('subcontractor.html')">👷</div>
    <div class="menu-item" id="payMenu" onclick="loadPage('payment.html')">💰</div>

    <!-- 🔍 SEARCH ICON -->
    <div class="menu-item" onclick="openSearchModal()">🔍</div>

    <button class="logout" onclick="logout()">Logout</button>
</div>

<!-- MAIN PANEL -->
<div class="content">

    <!-- PAGE CONTENT -->
    <div id="mainContent">
        Loading...
    </div>

</div>

<!-- 🔍 SEARCH MODAL -->
<div id="searchModal" class="search-modal">

    <div class="search-box">

        <input 
    type="text" 
    id="popupSearchInput"
    placeholder="Search company or subcontractor..."
    oninput="handlePopupSearch()"
>

        <div id="popupSuggestions"></div>

        <div class="search-footer">
            <button onclick="confirmSearch('company')">Search Company</button>
<button onclick="confirmSearch('subcontractor')">Search Subcontractor</button>
        </div>

    </div>

</div>

<!-- JS -->
<script src="./js/app.js"></script>

<!-- 🔐 ROLE CONTROL -->
<script>


if (role === "viewer") {
    const sub = document.getElementById("subMenu");
    const pay = document.getElementById("payMenu");

    if (sub) sub.style.display = "none";
    if (pay) pay.style.display = "none";
}
document.getElementById("searchModal").addEventListener("click", function(e){
    if (e.target.id === "searchModal") {
        closeSearchModal();
    }
});
</script>

</body>
</html>
