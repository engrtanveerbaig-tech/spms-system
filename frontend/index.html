<!DOCTYPE html>
<html>
<head>
<title>SPMS System</title>

<!-- ✅ EXTERNAL CSS -->
<script>
if (!localStorage.getItem("role")) {
    window.location.href = "login.html";
}
</script>
<style>
    /* ================= GLOBAL ================= */
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    display: flex;
}

/* ================= SIDEBAR ================= */
.sidebar {
    width: 220px;
    background: #1f4e79;
    color: white;

    height: 100vh;
    box-sizing: border-box;
    padding: 20px;
    display: flex;
    flex-direction: column;

    overflow: hidden; /* ✅ prevent overflow issues */
}
.sidebar-content {
    flex: 1;
    overflow-y: auto; /* ✅ scroll only menu, not logout */
}

.logo {
    font-size: 50px;
    opacity: 0.8;
    font-weight: bold;
    margin-bottom: 50px;

}

.menu-item {
    display: block;
    padding: 12px;
    cursor: pointer;
    border-radius: 6px;
    margin-bottom: 12px;
    font-size: 18px;
    text-align: center;
    transition: 0.2s;
}

.menu-item:hover {
    background: #163b5c;
    transform: scale(1.05);
}

/* ================= CONTENT ================= */
.content {
    flex: 1;
    padding: 20px;
    background: #f5f7fa;
}

/* ================= LOGOUT ================= */
.logout {
    margin-top: auto;   /* ✅ push to bottom */
    padding: 2px;
    background: rgb(213, 28, 28);
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 8px;

    width: 80%;        /* ✅ full width */
    
}

.logout:hover {
    background: rgb(255, 255, 255);
    color: black;
}

/* ================= SEARCH MODAL ================= */
/* ===== MODAL BACKGROUND ===== */
.search-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 99999;
}

/* ===== BOX ===== */
.search-box {
    background: rgba(255,255,255,0.08);   /* 🔥 transparent */
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);

    border-radius: 50px;
    width: 520px;
    max-width: 90%;

    padding: 25px;

    border: 1px solid rgba(255,255,255,0.15);

    box-shadow: 
        0 8px 32px rgba(0,0,0,0.3),
        inset 0 1px 0 rgba(255,255,255,0.1);
     position: relative;   
}

/* ===== SEARCH TYPE TOGGLE ===== */
.search-type-toggle {
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 4px;
}
.search-type-toggle button {
    background: transparent;
    color: rgba(255,255,255,0.6);
    border-radius: 50px;
}
.search-type-toggle button.active {
    background: linear-gradient(135deg, #3b82f6, #22c55e);
    color: white;
}
/* ================= INPUT ================= */
/* ===== INPUT ===== */
.search-box input {
    width: 90%;              /* 🔥 reduce width */
    margin: 15px auto;       /* 🔥 center inside box */
    display: block;

    padding: 12px 16px;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);

    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 50px;

    color: white;
    font-size: 15px;

    direction: rtl;          /* 🔥 Arabic fix */
    text-align: right;

    line-height: 1.8;        /* 🔥 spacing fix */

    outline: none;
}

.search-box input::placeholder {
    color: rgba(255,255,255,0.6);
}

.search-box input:focus {
    border-color: #3b82f6;
    box-shadow: 0 0 10px rgba(59,130,246,0.5);
}

.search-box input:focus {
    border-color: #1f4e79;
    box-shadow: 0 0 6px rgba(31,78,121,0.4);
}

/* ===== SUGGESTIONS ===== */
#popupSuggestions {
    width: 95%;
    margin: 0 auto;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    color: #f5f7fa;

    border-radius: 0px;
    border: 1px solid rgba(255,255,255,0.15);

    max-height: 180px;
    overflow-y: auto;

    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}


#popupSuggestions div {
    padding: 10px 16px;

    font-size: 14px;
    line-height: 1.8;

    direction: rtl;
    text-align: right;

    border-bottom: 1px solid rgba(255,255,255,0.08);

    transition: 0.2s;
}

#popupSuggestions div:last-child {
    border-bottom: none;
}

#popupSuggestions div:hover {
    background: linear-gradient(135deg, rgba(59,130,246,0.3), rgba(34,197,94,0.3));
}



/* ================= BUTTONS ================= */
.search-footer {
    margin-top: 20px;
}

/* ===== BUTTON ===== */
.search-footer {
    margin-top: 15px;
    text-align: center;
}
.search-footer button {
    margin-top: 10px;

    padding: 10px 24px;
    border-radius: 12px;

    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);

    color: white;

    transition: 0.3s;
}

.search-footer button:hover {
    background: linear-gradient(135deg, #3b82f6, #22c55e);
}
.sidebar-content::-webkit-scrollbar {
    width: 6px;
}
.sidebar-content::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.3);
    border-radius: 4px;
}

/* ================= ANIMATIONS ================= */
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* ===== ANIMATION ===== */
@keyframes scaleIn {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}
</style>
</head>

<body>



<!-- SIDEBAR -->
<div class="sidebar">

    

    <!-- 🔥 SCROLLABLE AREA -->
    <div class="sidebar-content">

        <div class="menu-item" onclick="loadPage('dashboard.html')">📊</div>
       <div class="menu-item" onclick="openSearchModal()">🔍</div>
        <div id="subMenu" class="menu-item" onclick="loadPage('subcontractor.html')">👷</div>
        <div id="payMenu" class="menu-item" onclick="loadPage('payment.html')">💰</div>
        <div class="menu-item" onclick="toggleTheme()">🌙</div>

        
    </div>
    <div class="logo">S<br><br>

    P<br><br>
S<br></div>

    <!-- 🔥 ALWAYS AT BOTTOM -->
    <button class="logout" onclick="logout()">Logout</button>

</div>

<!-- MAIN PANEL -->
<div class="content">

    <!-- 🔥 SCROLLABLE PAGE WRAPPER -->
    <div class="page-container">

        <!-- PAGE CONTENT (DYNAMIC LOAD) -->
        <div id="mainContent">
            Loading...
        </div>

    </div>

</div>

<!-- 🔍 SEARCH MODAL -->
<!-- 🔍 SEARCH MODAL -->
<div id="searchModal" class="search-modal">

    <div class="search-box">

        <!-- 🔥 SEARCH TYPE SELECT -->
        <div class="search-type-toggle">
            <button id="btnCompany" class="active" onclick="setSearchType('company')">
                Company
            </button>
            <button id="btnSubcontractor" onclick="setSearchType('subcontractor')">
                Subcontractor
            </button>
        </div>

        <!-- 🔍 INPUT -->
        <input 
            type="text" 
            id="popupSearchInput" 
            placeholder="Type to search..."
            oninput="handlePopupSearch()"
        >

        <!-- 📋 SUGGESTIONS -->
        <div id="popupSuggestions"></div>

        <!-- 🔘 ACTION -->
        <div class="search-footer">
            <button onclick="confirmSearch()">Search / بحث</button>
        </div>

    </div>

</div>

<!-- JS -->
<script src="./js/app.js"></script>

<!-- 🔐 ROLE CONTROL -->
<script>

if (localStorage.getItem("role") === "viewer") {

    const sub = document.getElementById("subMenu");
    const pay = document.getElementById("payMenu");

    if (sub) sub.style.display = "none";
    if (pay) pay.style.display = "none";
}
document.getElementById("searchModal").addEventListener("click", function(e){
    if (e.target.id === "searchModal") {
        closeSearchModal();
    }
});

// ✅ APPLY SAVED THEME
if (savedTheme === "dark") {
    document.body.classList.add("dark-mode");
}
</script>

</body>
</html>
