<!DOCTYPE html>
<html>
<head>
<title>SPMS Login</title>

<style>
body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0f172a;
    font-family: Arial;
}

.login-box {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    padding: 30px;
    border-radius: 16px;
    width: 320px;
    text-align: center;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
}

button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg,#3b82f6,#22c55e);
    border: none;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="login-box">
    <h2 style="color:white;">SPMS Login</h2>

    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
</div>

<script>
function login() {
    const u = document.getElementById("username").value;
    const p = document.getElementById("password").value;

    // 🔥 SIMPLE ROLE SYSTEM
    if (u === "admin" && p === "123") {
        localStorage.setItem("role", "admin");
        window.location.href = "index.html";
    } 
    else if (u === "viewer" && p === "123") {
        localStorage.setItem("role", "viewer");
        window.location.href = "index.html";
    } 
    else {
        alert("Invalid login");
    }
}
</script>

</body>
</html>
