<body>

<style>
    body {
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        font-family:Arial;
        background:#0f172a;
        color:white;
        text-align:center;
    }

    .box {
        max-width:400px;
    }

    h1 {
        font-size:28px;
        margin-bottom:10px;
    }

    p {
        opacity:0.7;
    }

    .timer {
        margin-top:20px;
        font-size:26px;
        color:#38bdf8;
        font-weight:bold;
    }
</style>

<div class="box">
    <h1>🚧 System Under Maintenance</h1>
    <p>We are upgrading the system.<br>Please check back soon.</p>

    <div class="timer" id="timer">Loading...</div>
</div>

<script>
    // ⏱ Set countdown (in seconds)
    let seconds = 5000; // 30 minutes

    function updateTimer() {
        let min = Math.floor(seconds / 60);
        let sec = seconds % 60;

        document.getElementById("timer").innerText =
            min + "m " + (sec < 10 ? "0" : "") + sec + "s";

        if (seconds > 0) {
            seconds--;
        }
    }

    updateTimer();
    setInterval(updateTimer, 1000);
</script>

</body>
