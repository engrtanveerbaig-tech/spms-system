<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-family:Arial;
        }
        .box {
            padding:30px;
            border:1px solid #ccc;
            border-radius:10px;
        }
        input {
            display:block;
            margin:10px 0;
            padding:8px;
            width:200px;
        }
        button {
            padding:10px;
            width:100%;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Login</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<script>
function login() {

    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    // 🔐 SIMPLE USERS
    if (user === "Adminacess" && pass === "acessadmin") {
        localStorage.setItem("role", "admin");
        window.location.href = "index.html";
    }
    else if (user === "viewer" && pass === "123") {
        localStorage.setItem("role", "viewer");
        window.location.href = "index.html";
    }
    else {
        alert("Invalid login");
    }
}
</script>

</body>
</html>
